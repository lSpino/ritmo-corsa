<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Calcolatore Ritmo Corsa</title>
   <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Calcolatore Ritmo Corsa</h1>

<!-- ===================== -->
<!-- 1. KM + TEMPO → RITMO -->
<!-- ===================== -->
<div class="box">
  <h2>Km + Tempo → Ritmo</h2>

  <input id="km1" type="number" placeholder="Km">

  <input id="h1" type="number" placeholder="Ore">
  <input id="m1" type="number" placeholder="Min">
  <input id="s1" type="number" placeholder="Sec">

  <br>

  <button onclick="calcolaRitmo()">Calcola ritmo</button>

  <p id="out1"></p>
</div>

<!-- ===================== -->
<!-- 2. RITMO + KM → TEMPO -->
<!-- ===================== -->
<div class="box">
  <h2>Ritmo + Km → Tempo</h2>

  <input id="km2" type="number" placeholder="Km">

  <input id="pm" type="number" placeholder="Min/km">
  <input id="ps" type="number" placeholder="Sec/km">

  <br>

  <button onclick="calcolaTempo()">Calcola tempo</button>

  <p id="out2"></p>
</div>

<script>

// ======================
// 1. TEMPO → RITMO
// ======================
function calcolaRitmo() {
  let km = parseFloat(document.getElementById("km1").value);

  let h = parseFloat(document.getElementById("h1").value) || 0;
  let m = parseFloat(document.getElementById("m1").value) || 0;
  let s = parseFloat(document.getElementById("s1").value) || 0;

  let tempoTotale = (h * 3600 + m * 60 + s) / 60; // minuti

  if (!km || km <= 0 || tempoTotale <= 0) {
    document.getElementById("out1").innerText = "Inserisci valori validi";
    return;
  }

  let ritmo = tempoTotale / km;

  let min = Math.floor(ritmo);
  let sec = Math.round((ritmo - min) * 60);

  document.getElementById("out1").innerText =
    "Ritmo: " + min + ":" + (sec < 10 ? "0" : "") + sec + " min/km";
}


// ======================
// 2. RITMO → TEMPO
// ======================
function calcolaTempo() {
  let km = parseFloat(document.getElementById("km2").value);

  let minKm = parseFloat(document.getElementById("pm").value) || 0;
  let secKm = parseFloat(document.getElementById("ps").value) || 0;

  if (!km || km <= 0) {
    document.getElementById("out2").innerText = "Inserisci km validi";
    return;
  }

  let ritmoTotale = minKm * 60 + secKm; // secondi per km

  let tempoTotaleSec = ritmoTotale * km;

  let ore = Math.floor(tempoTotaleSec / 3600);
  let min = Math.floor((tempoTotaleSec % 3600) / 60);
  let sec = Math.round(tempoTotaleSec % 60);

  document.getElementById("out2").innerText =
    "Tempo: " + ore + "h " + min + "m " + sec + "s";
}

</script>

</body>
</html>
